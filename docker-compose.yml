services:
  pwlistmanager:
    build: .
    container_name: pwlistmanager
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      # Persist database and logs outside the container
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Europe/London
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s